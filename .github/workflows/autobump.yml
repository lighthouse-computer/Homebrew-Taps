name: Auto-bump casks

# For each cask in this tap, query the upstream repo's "latest release" via
# the GitHub API, compare with the cask's pinned version, and (if newer) open
# a PR bumping `version` + `sha256`. We deliberately avoid `brew livecheck` /
# `brew bump-cask-pr` because the JSON schema drifts across brew versions and
# `bump-cask-pr` requires `--version` for third-party tap casks even when
# livecheck is configured.
#
# Idempotent: each bump uses a branch named `autobump/<cask>-<version>`; if
# the branch already exists (PR open or merged), the run is a no-op.
#
# Manual trigger: Actions → Auto-bump casks → "Run workflow".

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write       # push the bump branch
  pull-requests: write  # open the PR

jobs:
  autobump:
    runs-on: macos-14
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name  "autobump-bot"
          git config user.email "autobump-bot@users.noreply.github.com"

      - name: Bump each cask
        run: |
          set -uo pipefail
          shopt -s nullglob
          for cask_file in Casks/*.rb; do
            cask="$(basename "$cask_file" .rb)"
            echo "::group::${cask}"

            # Extract the upstream owner/repo from the `url` line. We assume a
            # GitHub release URL like:
            #   url "https://github.com/OWNER/REPO/releases/download/v#{version}/asset.zip"
            upstream="$(grep -E '^\s*url\s+"https://github\.com/' "$cask_file" \
                       | head -1 \
                       | sed -E 's|.*github\.com/([^/]+/[^/]+)/.*|\1|')"
            if [[ -z "$upstream" ]]; then
              echo "::warning::could not parse upstream repo from $cask_file"
              echo "::endgroup::"; continue
            fi

            current="$(grep -E '^\s*version\s+"' "$cask_file" | head -1 \
                       | sed -E 's/.*version[[:space:]]+"([^"]+)".*/\1/')"
            latest_tag="$(gh api "repos/${upstream}/releases/latest" --jq .tag_name 2>/dev/null || true)"
            latest="${latest_tag#v}"

            if [[ -z "$latest" ]]; then
              echo "no latest release for ${upstream}"
              echo "::endgroup::"; continue
            fi
            if [[ "$latest" == "$current" ]]; then
              echo "${cask} at latest (${current})"
              echo "::endgroup::"; continue
            fi
            echo "${cask}: ${current} → ${latest}"

            branch="autobump/${cask}-${latest}"
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              echo "branch ${branch} already exists on origin — skipping"
              echo "::endgroup::"; continue
            fi

            # Reconstruct the new download URL by substituting the version.
            url_template="$(grep -E '^\s*url\s+"' "$cask_file" | head -1 \
                            | sed -E 's|.*url[[:space:]]+"([^"]+)".*|\1|')"
            new_url="${url_template//\#\{version\}/$latest}"

            tmp="$(mktemp -d)"
            asset="${tmp}/$(basename "$new_url")"
            if ! curl -fsSL "$new_url" -o "$asset"; then
              echo "::warning::failed to download ${new_url}"
              echo "::endgroup::"; continue
            fi
            new_sha="$(shasum -a 256 "$asset" | awk '{print $1}')"

            # In-place version + sha256 rewrite (BSD sed needs '' after -i).
            sed -E -i '' "s|^([[:space:]]*version[[:space:]]+)\"[^\"]+\"|\1\"${latest}\"|" "$cask_file"
            sed -E -i '' "s|^([[:space:]]*sha256[[:space:]]+)\"[a-f0-9]{64}\"|\1\"${new_sha}\"|" "$cask_file"

            if git diff --quiet "$cask_file"; then
              echo "no textual change for ${cask} — skipping"
              echo "::endgroup::"; continue
            fi

            git checkout -B "$branch"
            git add "$cask_file"
            git commit -m "${cask} ${current} → ${latest}"
            git push -u origin "$branch"

            body="$(printf 'Auto-bumps **%s** to upstream release v%s.\n\nNew sha256: `%s`.\n\nOpened by .github/workflows/autobump.yml on a GitHub-API release check.\n' "$cask" "$latest" "$new_sha")"
            gh pr create --base main --head "$branch" \
              --title "${cask} ${current} → ${latest}" \
              --body "$body"

            git checkout main
            echo "::endgroup::"
          done
          # Always succeed: per-cask up-to-date is the normal state.
          exit 0
